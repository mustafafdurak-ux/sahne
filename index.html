const ListIcon = ({type,active,size=20,color="#1a1a1a"}) => {
  const s = {stroke:color,fill:"none",strokeWidth:"2.2",strokeLinecap:"round",strokeLinejoin:"round"};
  const af = active ? color : "none";
  const icons = {
    watched:   <svg width={size} height={size} viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" {...s} strokeWidth="2.5" fill="none"/></svg>,
    watchlist: <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" {...s}/><polyline points="12 6 12 12 16 14" {...s}/></svg>,
    recommend: <svg width={size} height={size} viewBox="0 0 24 24" fill={af}><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z" {...s}/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" {...s}/></svg>,
    avoid:     <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" {...s}/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07" stroke={color} strokeWidth="2.2" strokeLinecap="round"/></svg>,
    bucket:    <svg width={size} height={size} viewBox="0 0 24 24" fill={af}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" {...s}/></svg>,
  };
  return icons[type]||null;
};

const globalCSS = (dm) => `
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:${dm?"#0f0f0f":"#faf8f3"};font-family:'Outfit',sans-serif;transition:background 0.3s;}
  ::-webkit-scrollbar{display:none;}
  button,input,textarea,select{font-family:'Outfit',sans-serif;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes heartBeat{0%{transform:scale(1)}40%{transform:scale(1.45)}70%{transform:scale(0.88)}100%{transform:scale(1)}}
  @keyframes storyPulse{0%,100%{box-shadow:0 0 0 2px #f97316}50%{box-shadow:0 0 0 3px #f97316,0 0 12px #f97316aa}}
  .fade-up{animation:fadeUp 0.3s ease both;}
  .slide-up{animation:slideUp 0.38s cubic-bezier(0.32,0.72,0,1);}
  .press{transition:transform 0.12s,opacity 0.12s;cursor:pointer;}
  .press:active{transform:scale(0.91);opacity:0.6;}
  .heart{animation:heartBeat 0.45s ease;}
  .story-ring{animation:storyPulse 2s ease-in-out infinite;}
`;

function App() {
  const [dm, setDm] = useState(()=>LS.get("sahne_dm", false));
  const t = dm ? DARK : LIGHT;

  // Auth
  const [authPage, setAuthPage] = useState("login"); // login | register
  const [currentUser, setCurrentUser] = useState(()=>LS.get("sahne_user", null));
  const [users, setUsers] = useState(()=>LS.get("sahne_users", []));

  // App state
  const [page, setPage] = useState("feed");
  const [feedContent, setFeedContent] = useState([]);
  const [discoverMovies, setDiscoverMovies] = useState([]);
  const [loading, setLoading] = useState(false);
  const [pgNum, setPgNum] = useState(1);
  const [hasMore, setHasMore] = useState(true);
  const [search, setSearch] = useState("");
  const [searchRes, setSearchRes] = useState([]);
  const [userMovies, setUserMovies] = useState(()=>LS.get("sahne_lists", {}));
  const [customContent, setCustomContent] = useState(()=>LS.get("sahne_custom", []));
  const [selItem, setSelItem] = useState(null);
  const [itemDetail, setItemDetail] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [starRating, setStarRating] = useState(0);
  const [hoverStar, setHoverStar] = useState(0);
  const [likes, setLikes] = useState(()=>LS.get("sahne_likes", {}));
  const [comments, setComments] = useState(()=>LS.get("sahne_comments", {
    b1:[{userId:4,text:"Christopher Nolan'ın en iyi filmi 🚀",likes:34,time:"2s"},{userId:1,text:"O son sahne kafamda dönüyor...",likes:18,time:"5s"}],
    b2:[{userId:1,text:"Sinema tarihinin zirvesi.",likes:89,time:"1g"},{userId:3,text:"Al Pacino bu filmde inanılmaz",likes:42,time:"2g"}],
    b5:[{userId:2,text:"Heath Ledger'ın Joker'i mükemmel 🃏",likes:156,time:"3s"}],
    s1:[{userId:4,text:"Hayatımın dizisi. Bir daha izliyorum.",likes:201,time:"1g"}],
  }));
  const [commentText, setCommentText] = useState("");
  const [following, setFollowing] = useState(()=>LS.get("sahne_following", [1,4]));
  const [messages, setMessages] = useState(()=>LS.get("sahne_msgs", {
    1:[{from:1,text:"Fight Club'ı izledin mi? 🔥",time:"10:30"}],
    2:[{from:2,text:"Interstellar harika değil mi?",time:"Dün"}],
  }));
  const [activeChat, setActiveChat] = useState(null);
  const [msgText, setMsgText] = useState("");
  const [profileUser, setProfileUser] = useState(null);
  const [activeList, setActiveList] = useState("watched");
  const [addModal, setAddModal] = useState(false);
  const [shareModal, setShareModal] = useState(null);
  const [storyModal, setStoryModal] = useState(null);
  const [addStoryModal, setAddStoryModal] = useState(false);
  const [stories, setStories] = useState(()=>LS.get("sahne_stories", DEMO_STORIES));
  const [newItem, setNewItem] = useState({title:"",year:"",genre:"",overview:"",poster:"",trailer:"",type:"film",seasons:[{s:1,ep:0,rating:""}]});
  const [discoverTab, setDiscoverTab] = useState("film"); // film | dizi
  const [profileEditModal, setProfileEditModal] = useState(false);
  const [editBio, setEditBio] = useState("");
  const [statsModal, setStatsModal] = useState(false);
  const [seenStories, setSeenStories] = useState(()=>LS.get("sahne_seen_stories",[]));

  // Auth forms
  const [loginForm, setLoginForm] = useState({email:"",pass:""});
  const [regForm, setRegForm] = useState({name:"",surname:"",email:"",pass:"",age:""});
  const [authErr, setAuthErr] = useState("");

  // Style injection
  useEffect(()=>{
    const el=document.createElement("style");
    el.id="sahne-css";
    el.textContent=globalCSS(dm);
    document.head.appendChild(el);
    return()=>el.remove();
  },[dm]);

  // Persist to localStorage
  useEffect(()=>LS.set("sahne_dm",dm),[dm]);
  useEffect(()=>LS.set("sahne_lists",userMovies),[userMovies]);
  useEffect(()=>LS.set("sahne_likes",likes),[likes]);
  useEffect(()=>LS.set("sahne_comments",comments),[comments]);
  useEffect(()=>LS.set("sahne_following",following),[following]);
  useEffect(()=>LS.set("sahne_msgs",messages),[messages]);
  useEffect(()=>LS.set("sahne_custom",customContent),[customContent]);
  useEffect(()=>LS.set("sahne_stories",stories),[stories]);
  useEffect(()=>LS.set("sahne_seen_stories",seenStories),[seenStories]);

  // Init feed
  useEffect(()=>{
    fetchTMDB("popular",1,false);
    const shuffled=[...BUILTIN].sort(()=>Math.random()-0.5);
    setFeedContent([...shuffled,...customContent]);
  },[]);

  const fetchTMDB = async(cat,pg,append=false)=>{
    setLoading(true);
    try{
      const eps={popular:"/movie/popular",top_rated:"/movie/top_rated",on_air:"/tv/on_the_air",top_tv:"/tv/top_rated"};
      const r=await fetch(`${BASE}${eps[cat]}?api_key=${API_KEY}&language=tr-TR&page=${pg}`);
      const d=await r.json();
      if(!d.results){setLoading(false);return;}
      const mapped=d.results.map(m=>({...m,_tmdb:true,type:cat.includes("tv")||cat==="on_air"?"dizi":"film"}));
      setDiscoverMovies(prev=>append?[...prev,...mapped]:mapped);
      setHasMore(pg<Math.min(d.total_pages||1,8));
    }catch{}
    setLoading(false);
  };

  const doSearch=async(q)=>{
    if(!q){setSearchRes([]);return;}
    setLoading(true);
    try{
      const [mr,tr]=await Promise.all([
        fetch(`${BASE}/search/movie?api_key=${API_KEY}&language=tr-TR&query=${encodeURIComponent(q)}`).then(r=>r.json()),
        fetch(`${BASE}/search/tv?api_key=${API_KEY}&language=tr-TR&query=${encodeURIComponent(q)}`).then(r=>r.json()),
      ]);
      const movies=(mr.results||[]).map(m=>({...m,_tmdb:true,type:"film"}));
      const tvs=(tr.results||[]).map(m=>({...m,_tmdb:true,type:"dizi",title:m.name||m.title,release_date:m.first_air_date}));
      setSearchRes([...movies,...tvs].sort((a,b)=>(b.popularity||0)-(a.popularity||0)));
    }catch{}
    setLoading(false);
  };

  // ─── Auth ───
  const doRegister = () => {
    if(!regForm.name||!regForm.email||!regForm.pass) return setAuthErr("Ad, e-posta ve şifre zorunlu");
    if(users.find(u=>u.email===regForm.email)) return setAuthErr("Bu e-posta zaten kayıtlı");
    const u = { id:`u_${Date.now()}`, name:regForm.name, surname:regForm.surname, email:regForm.email, pass:regForm.pass, age:regForm.age, username:(regForm.name+regForm.surname).toLowerCase().replace(/\s/g,"").slice(0,16), bio:"", avatar:"🎬", color:"#92400e", followers:0, following:0 };
    const newUsers=[...users,u];
    setUsers(newUsers);
    LS.set("sahne_users",newUsers);
    setCurrentUser(u);
    LS.set("sahne_user",u);
    setAuthErr("");
  };

  const doLogin = () => {
    // Check demo shortcut
    if(loginForm.email==="demo"&&loginForm.pass==="demo"){
      const demo={ id:"demo", name:"Demo Kullanıcı", username:"demo", bio:"Sahne demo hesabı", avatar:"🎬", color:"#92400e", followers:12, following:4, email:"demo" };
      setCurrentUser(demo); LS.set("sahne_user",demo); return;
    }
    const u=users.find(x=>x.email===loginForm.email&&x.pass===loginForm.pass);
    if(!u) return setAuthErr("E-posta veya şifre hatalı");
    setCurrentUser(u); LS.set("sahne_user",u); setAuthErr("");
  };

  const doLogout=()=>{ setCurrentUser(null); LS.set("sahne_user",null); setPage("feed"); };

  const updateProfile=(bio)=>{
    const updated={...currentUser,bio};
    setCurrentUser(updated); LS.set("sahne_user",updated);
    const newUsers=users.map(u=>u.id===updated.id?updated:u);
    setUsers(newUsers); LS.set("sahne_users",newUsers);
    setProfileEditModal(false);
  };

  const getUserData=id=>userMovies[id]||{};
  const toggleList=(item,list)=>{
    setUserMovies(prev=>{const cur=prev[item.id]||{};return{...prev,[item.id]:{...cur,[list]:!cur[list],_item:item}};});
  };
  const toggleLike=id=>setLikes(prev=>({...prev,[id]:!prev[id]}));

  const openDetail=async(item)=>{
    const d=getUserData(item.id);
    setNoteText(d.note||"");setStarRating(d.rating||0);setHoverStar(0);
    setSelItem(item);setItemDetail(null);setCommentText("");
    if(item._tmdb){
      const ep=item.type==="dizi"?`/tv/${item.id}`:`/movie/${item.id}`;
      try{const r=await fetch(`${BASE}${ep}?api_key=${API_KEY}&language=tr-TR`);setItemDetail(await r.json());}catch{}
    }
  };

  const saveNote=()=>{
    setUserMovies(prev=>{const cur=prev[selItem.id]||{};return{...prev,[selItem.id]:{...cur,note:noteText,rating:starRating,_item:selItem}};});
    setSelItem(null);
  };

  const addComment=()=>{
    if(!commentText.trim())return;

  },0);
  const genreCounts={};
  watched.forEach(m=>{

  const topGenre=Object.entries(genreCounts).sort((a,b)=>b[1]-a[1])[0];

  const unread=Object.keys(messages).filter(uid=>{const m=messages[uid];return m?.length>0&&m[m.length-1].from!==ME.id;}).length;

            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,marginBottom:18,color:t.text}}>İSTATİSTİKLER</div>

// ─── MasonryGrid ───
function MasonryGrid({movies,onOpen,getUserData,pct,sc,dm,comments,IMG,GENRE_MAP,t}){
  const left=movies.filter((_,i)=>i%2===0);
  const right=movies.filter((_,i)=>i%2===1);
  const Card=({m,tall})=>{
    const poster=m._tmdb?(m.poster_path?`${IMG}${m.poster_path}`:null):m.poster;
    const rating=m._tmdb?(m.vote_average?.toFixed(1)||"?"):m.rating;
    const score=m._tmdb?pct(m.vote_average):(m.recommend||0);
    const year=m._tmdb?(m.release_date?.slice(0,4)||m.first_air_date?.slice(0,4)||""):m.year;
    const genre=m._tmdb?(m.genre_ids?.[0]?GENRE_MAP[m.genre_ids[0]]:""):m.genre;
    const ud=getUserData(m.id);
    const h=tall?265:185;
    return(
      <div onClick={()=>onOpen(m)} className="press" style={{background:t.card,borderRadius:14,overflow:"hidden",marginBottom:8,border:`1px solid ${t.border}`,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <div style={{position:"relative",height:h,background:t.border,overflow:"hidden"}}>
          {poster?<img src={poster} style={{width:"100%",height:"100%",objectFit:"cover"}} loading="lazy" onError={e=>e.target.style.display="none"}/>
            :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",padding:8,textAlign:"center"}}><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:t.faint,lineHeight:1.2}}>{m.title||m.name}</span></div>}
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 55%)"}}/>
          <div style={{position:"absolute",top:7,right:7,background:"rgba(0,0,0,0.6)",borderRadius:20,padding:"2px 7px",display:"flex",alignItems:"center",gap:2}}>
            <span style={{fontSize:9,color:"#fbbf24",fontWeight:800}}>★</span>
            <span style={{fontSize:9,fontWeight:700,color:"#fff"}}>{rating}</span>
          </div>
          {m.type==="dizi"&&<div style={{position:"absolute",top:7,left:7,background:"#7c3aed",borderRadius:5,padding:"2px 6px"}}><span style={{fontSize:8,fontWeight:700,color:"#fff"}}>DİZİ</span></div>}
          {ud.watched&&<div style={{position:"absolute",top:m.type==="dizi"?26:7,left:7,width:17,height:17,background:t.text,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke={t.bg} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>}
          <div style={{position:"absolute",bottom:7,left:8,right:8}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:"#fff",letterSpacing:0.4,lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.title||m.name}</div>
          </div>
        </div>
        <div style={{padding:"7px 9px 8px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:10,color:t.faint,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{year}{genre?" · "+genre:""}</span>
            <span style={{fontSize:10,fontWeight:700,color:sc(m.vote_average||m.rating/10,dm),flexShrink:0}}>%{score}</span>
          </div>
        </div>
      </div>
    );
  };
  return(
    <div style={{display:"flex",gap:8,padding:"8px 12px",alignItems:"flex-start"}}>
      <div style={{flex:1}}>{left.map((m,i)=><Card key={m.id} m={m} tall={i%3===0}/>)}</div>
      <div style={{flex:1,marginTop:22}}>{right.map((m,i)=><Card key={m.id} m={m} tall={i%3===1}/>)}</div>
    </div>
  );
}

// ─── FeedCard ───
function FeedCard({item,idx,t,dm,liked,onLike,onOpen,saved,onSave,onShare,comments,allUsers,onUserClick,getUserData,LISTS,pct,sc,IMG,IMG_BIG}){
  const user=allUsers[idx%allUsers.length]||allUsers[0];
  const [loc,setLoc]=useState(liked);
  const [anim,setAnim]=useState(false);
  const touchX=useRef(null);
  const [slide,setSlide]=useState(0);
  const doLike=()=>{setLoc(p=>!p);setAnim(true);setTimeout(()=>setAnim(false),450);onLike();};
  const imgs=[
    item._tmdb&&item.backdrop_path?`${IMG_BIG}${item.backdrop_path}`:null,
    item._tmdb&&item.poster_path?`${IMG_BIG}${item.poster_path}`:null,
    item.backdrop||null, item.poster||null,
  ].filter(Boolean).slice(0,3);
  const ud=getUserData(item.id);
  const actions=["izledi","öneriyor","listeye ekledi","harika buldu","kaçırmayın!"][idx%5];
  const timeAgo=["2 saat önce","dün","3 gün önce","1 hafta önce","az önce"][idx%5];
  const baseLikes=item._tmdb?Math.floor(item.popularity||0)+20:Math.floor((item.votes||0)/1000)+50;

  return(
    <div style={{background:t.card,margin:"0 0 6px",borderTop:`1.5px solid ${t.border}`,borderBottom:`1.5px solid ${t.border}`}} className="fade-up">
      {/* User row */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px"}}>
        <div onClick={()=>onUserClick(user)} className="press" style={{width:38,height:38,borderRadius:11,background:user.color||"#555",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,border:`2px solid ${t.text}`,boxShadow:`2px 2px 0 ${t.border}`,flexShrink:0}}>
          {user.avatar||"🎬"}
        </div>
        <div style={{flex:1}} onClick={()=>onUserClick(user)}>
          <span style={{fontWeight:800,fontSize:14,color:t.text}}>{user.name}</span>
          <span style={{fontSize:13,color:t.faint}}> {actions}</span>
          {item.type==="dizi"&&<span style={{fontSize:10,fontWeight:700,color:"#7c3aed",marginLeft:6,background:"#7c3aed20",padding:"1px 6px",borderRadius:10}}>DİZİ</span>}
          <div style={{fontSize:11,color:t.faint,marginTop:1}}>{timeAgo}</div>
        </div>
        <button style={{background:"none",border:"none",fontSize:18,color:t.faint,padding:4}}>···</button>
      </div>

      {/* Overview ABOVE image (Twitter-style) */}
      {(item.overview)&&(
        <div style={{padding:"0 13px 10px",fontSize:14,color:t.sub,lineHeight:1.55,fontWeight:400}}>
          <span style={{fontWeight:700,color:t.text,cursor:"pointer"}} onClick={onOpen}>{item.title} </span>
          <span>{item.overview.slice(0,120)}{item.overview.length>120?"...":""}</span>
        </div>
      )}

      {/* Image */}
      <div style={{position:"relative",background:t.border,overflow:"hidden"}}
        onTouchStart={e=>touchX.current=e.touches[0].clientX}
        onTouchEnd={e=>{if(!touchX.current)return;const d=touchX.current-e.changedTouches[0].clientX;if(d>50&&slide<imgs.length-1)setSlide(p=>p+1);else if(d<-50&&slide>0)setSlide(p=>p-1);touchX.current=null;}}>
        {imgs.length>0?(
          <div style={{display:"flex",transition:"transform 0.3s ease",transform:`translateX(-${slide*100}%)`}}>
            {imgs.map((src,i)=><img key={i} src={src} style={{width:"100%",aspectRatio:"16/9",objectFit:"cover",flexShrink:0}} loading="lazy" onError={e=>e.target.style.display="none"}/>)}
          </div>
        ):(
          <div style={{width:"100%",aspectRatio:"16/9",display:"flex",alignItems:"center",justifyContent:"center",background:t.border}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:t.faint,letterSpacing:2}}>{item.title}</div>
          </div>
        )}
        {imgs.length>1&&(
          <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",display:"flex",gap:4}}>
            {imgs.map((_,i)=><div key={i} style={{width:i===slide?16:5,height:5,borderRadius:3,background:i===slide?"#fff":"rgba(255,255,255,0.4)",transition:"all 0.2s"}}/>)}
          </div>
        )}
        <div style={{position:"absolute",top:10,right:10,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(6px)",borderRadius:8,padding:"3px 8px",display:"flex",alignItems:"center",gap:3}}>
          <span style={{fontSize:10,fontWeight:800,color:"#fbbf24"}}>★</span>
          <span style={{fontSize:11,fontWeight:700,color:"#fff"}}>{item._tmdb?(item.vote_average?.toFixed(1)||"?"):item.rating}</span>
        </div>
      </div>

      {/* Actions */}
      <div style={{padding:"9px 13px 5px",display:"flex",alignItems:"center",gap:14}}>
        <button className="press" onClick={doLike} style={{background:"none",border:"none",padding:0}}>
          <div className={anim?"heart":""} style={{fontSize:23,lineHeight:1}}>{loc?"❤️":"🤍"}</div>
        </button>
        <button className="press" onClick={onOpen} style={{background:"none",border:"none",padding:0,fontSize:21,lineHeight:1}}>💬</button>
        <button className="press" onClick={onShare} style={{background:"none",border:"none",padding:0,fontSize:18,lineHeight:1}}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={t.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
        <div style={{flex:1}}/>
        <button className="press" onClick={onSave} style={{background:"none",border:"none",padding:0,fontSize:21,lineHeight:1}}>
          {saved?"🔖":"🏷️"}
        </button>
      </div>

      {/* Stats */}
      <div style={{padding:"0 13px 9px"}}>
        <div style={{fontWeight:700,fontSize:13,color:t.text,marginBottom:3}}>{(baseLikes+(loc?1:0)).toLocaleString()} beğeni</div>
        {Object.entries(LISTS).some(([k])=>ud[k])&&(
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:5}}>
            {Object.entries(LISTS).map(([k,v])=>ud[k]?<span key={k} style={{fontSize:9,fontWeight:700,color:t.bg,background:t.text,padding:"2px 8px",borderRadius:20}}>{v.label}</span>:null)}
          </div>
        )}
        {comments.length>0&&(
          <div style={{fontSize:12,marginTop:3}}>
            <span style={{color:t.faint,cursor:"pointer"}} onClick={onOpen}>Tüm {comments.length} yorum · </span>
            <span style={{fontWeight:700,color:t.text}}>{allUsers.find(u=>u.id===comments[0].userId)?.username||"kullanici"} </span>
            <span style={{color:t.sub}}>{comments[0].text.slice(0,60)}{comments[0].text.length>60?"...":""}</span>
          </div>
        )}
      </div>
    </div>
  );
}

          <div style={{fontSize:13,color:t.faint}}>İçeriklere tıklayarak listene ekleyebilirsin</div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:2,padding:2}}>
          {getListItems(activeList).map(m=>{
            const poster=m._tmdb?(m.poster_path?`${IMG}${m.poster_path}`:null):m.poster;
            return(
              <div key={m.id} onClick={()=>onItemClick(m)} className="press" style={{position:"relative",aspectRatio:"2/3",background:t.border,overflow:"hidden"}}>
                {poster?<img src={poster} style={{width:"100%",height:"100%",objectFit:"cover"}} loading="lazy" onError={e=>e.target.style.display="none"}/>
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",padding:4,textAlign:"center"}}><span style={{fontSize:9,color:t.faint,fontWeight:600,lineHeight:1.3}}>{m.title}</span></div>}
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.65) 0%,transparent 50%)"}}/>
                {m.type==="dizi"&&<div style={{position:"absolute",top:3,right:3,background:"#7c3aed",borderRadius:4,padding:"1px 5px"}}><span style={{fontSize:7,fontWeight:700,color:"#fff"}}>DİZİ</span></div>}
                <div style={{position:"absolute",bottom:3,left:4,right:4}}>
                  <div style={{fontSize:8,fontWeight:700,color:"#fff",lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.title}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
